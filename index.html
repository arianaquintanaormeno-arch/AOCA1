<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maqueta 3D del Tahuantinsuyo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #blocker {
            position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 10; cursor: pointer; transition: opacity 0.3s;
        }
        #blocker h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); letter-spacing: 2px; color: #f4e4bc; }
        #blocker p { font-size: 16px; color: #ddd; margin: 5px 0; }
        #instructions { margin-top: 20px; padding: 20px; border: 1px solid rgba(244, 228, 188, 0.3); border-radius: 8px; background: rgba(0,0,0,0.4); text-align: center; }
        #ui-hint {
            position: absolute; bottom: 20px; left: 20px; color: rgba(255,255,255,0.6); 
            font-size: 14px; pointer-events: none; z-index: 5; display: none;
        }
    </style>
</head>
<body>
    <div id="blocker">
        <h1>MAQUETA TAHUANTINSUYO</h1>
        <p>Haz clic en cualquier lugar para interactuar con la maqueta</p>
        <div id="instructions">
            <p>🖱️ <strong>Click izquierdo + Arrastrar:</strong> Rotar vista</p>
            <p>🔍 <strong>Rueda del mouse:</strong> Acercar / Alejar</p>
            <p>✋ <strong>Click derecho + Arrastrar:</strong> Mover cámara (Pan)</p>
        </div>
    </div>
    <div id="ui-hint">Maqueta interactiva del Tahuantinsuyo</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

        // --- Configuración de la Escena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a2a); // Fondo oscuro tipo estudio
        scene.fog = new THREE.FogExp2(0x2a2a2a, 0.003);

        // Cámara isométrica / diorama
        const aspect = window.innerWidth / window.innerHeight;
        const d = 120;
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
        camera.position.set(100, 100, 100); // Ángulo isométrico clásico
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Iluminación tipo Estudio de Maqueta ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfff4e5, 1.4);
        sunLight.position.set(50, 100, 50);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 300;
        sunLight.shadow.camera.left = -100;
        sunLight.shadow.camera.right = 100;
        sunLight.shadow.camera.top = 100;
        sunLight.shadow.camera.bottom = -100;
        scene.add(sunLight);

        // Luz de relleno suave para las sombras
        const fillLight = new THREE.DirectionalLight(0x87CEEB, 0.3);
        fillLight.position.set(-50, 20, -50);
        scene.add(fillLight);

        // --- Función de Terreno (Heightmap) ---
        function getHeight(x, z) {
            let y = Math.sin(x * 0.01) * 10 + Math.cos(z * 0.01) * 10;
            const dist = Math.sqrt(x * x + z * z);
            
            if (dist > 90) {
                y += (dist - 90) * 0.9 + Math.sin(x * 0.08) * 4 + Math.cos(z * 0.08) * 4;
            }
            
            const riverX = x + Math.sin(z * 0.03) * 15;
            const riverDist = Math.abs(riverX);
            if (riverDist < 18) {
                y -= (18 - riverDist) * 0.7;
            }
            
            if (z < -110 && Math.abs(x) < 50) {
                y = -4; 
            }
            return y;
        }

        // --- Generación del Terreno y Base ---
        const terrainGeo = new THREE.PlaneGeometry(400, 400, 150, 150);
        const pos = terrainGeo.attributes.position;
        for (let i = 0; i < pos.count; i++) {
            const x = pos.getX(i);
            const z = -pos.getZ(i); 
            pos.setY(i, getHeight(x, z));
        }
        terrainGeo.computeVertexNormals();
        
        // Material estilo "arcilla/pintura" para la maqueta
        const terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0x5a7d51, flatShading: true, roughness: 0.8, metalness: 0.1
        });
        const terrain = new THREE.Mesh(terrainGeo, terrainMat);
        terrain.rotation.x = -Math.PI / 2;
        terrain.receiveShadow = true;
        scene.add(terrain);

        // Base de la maqueta (efecto plataforma de madera/tierra)
        const baseGeo = new THREE.BoxGeometry(400, 15, 400);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x3e2723, roughness: 0.9 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = -12;
        base.receiveShadow = true;
        scene.add(base);

        // --- Agua (Río y Lago) ---
        const waterGeo = new THREE.PlaneGeometry(400, 400, 64, 64);
        const waterMat = new THREE.MeshStandardMaterial({ 
            color: 0x0077be, transparent: true, opacity: 0.8, roughness: 0.1, metalness: 0.3 
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.position.y = -2.5;
        scene.add(water);

        // --- Generadores de Objetos ---
        const llamas = [];
        const bubblesList = [];

        function generateForest() {
            const trunk = new THREE.CylinderGeometry(0.2, 0.3, 1.5, 6);
            trunk.translate(0, 0.75, 0);
            const leaves = new THREE.ConeGeometry(1.2, 3, 6);
            leaves.translate(0, 2.5, 0);
            const treeGeo = mergeGeometries([trunk, leaves]);
            // Colores más vibrantes tipo maqueta pintada
            const treeMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, flatShading: true });
            const trees = new THREE.InstancedMesh(treeGeo, treeMat, 1000);
            const dummy = new THREE.Object3D();
            let idx = 0;
            for (let i = 0; i < 3000; i++) {
                if (idx >= 1000) break;
                const x = (Math.random() - 0.5) * 300;
                const z = (Math.random() - 0.5) * 300;
                const y = getHeight(x, z);
                const riverX = x + Math.sin(z * 0.03) * 15;
                if (Math.abs(riverX) < 20 || y < -1 || y > 35) continue;
                
                dummy.position.set(x, y, z);
                const s = 0.8 + Math.random() * 0.6;
                dummy.scale.set(s, s, s);
                dummy.rotation.y = Math.random() * Math.PI;
                dummy.updateMatrix();
                trees.setMatrixAt(idx++, dummy.matrix);
            }
            trees.instanceMatrix.needsUpdate = true;
            scene.add(trees);
        }

        function generateGrass() {
            const geo = new THREE.PlaneGeometry(0.3, 0.6);
            geo.translate(0, 0.3, 0);
            const mat = new THREE.MeshStandardMaterial({ color: 0x6b8e23, side: THREE.DoubleSide });
            const grass = new THREE.InstancedMesh(geo, mat, 4000);
            const dummy = new THREE.Object3D();
            let idx = 0;
            for (let i = 0; i < 8000; i++) {
                if (idx >= 4000) break;
                const x = (Math.random() - 0.5) * 250;
                const z = (Math.random() - 0.5) * 250;
                const y = getHeight(x, z);
                if (y < -1 || y > 25) continue;
                dummy.position.set(x, y, z);
                dummy.rotation.y = Math.random() * Math.PI;
                dummy.rotation.z = (Math.random() - 0.5) * 0.5;
                dummy.updateMatrix();
                grass.setMatrixAt(idx++, dummy.matrix);
            }
            grass.instanceMatrix.needsUpdate = true;
            scene.add(grass);
        }

        function generateRocks() {
            const geo = new THREE.DodecahedronGeometry(1, 0);
            const mat = new THREE.MeshStandardMaterial({ color: 0x7a7a7a, flatShading: true });
            const rocks = new THREE.InstancedMesh(geo, mat, 300);
            const dummy = new THREE.Object3D();
            let idx = 0;
            for (let i = 0; i < 800; i++) {
                if (idx >= 300) break;
                const x = (Math.random() - 0.5) * 280;
                const z = (Math.random() - 0.5) * 280;
                const y = getHeight(x, z);
                if (y < -1) continue;
                dummy.position.set(x, y + 0.3, z);
                const s = 0.4 + Math.random() * 1.2;
                dummy.scale.set(s, s * 0.7, s);
                dummy.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                dummy.updateMatrix();
                rocks.setMatrixAt(idx++, dummy.matrix);
            }
            rocks.instanceMatrix.needsUpdate = true;
            scene.add(rocks);
        }

        function createHouse(x, z, rot) {
            const group = new THREE.Group();
            const walls = new THREE.Mesh(new THREE.BoxGeometry(3.5, 2.5, 4.5), new THREE.MeshStandardMaterial({ color: 0x9c9c9c }));
            walls.position.y = 1.25;
            walls.castShadow = true; walls.receiveShadow = true;
            const roof = new THREE.Mesh(new THREE.ConeGeometry(3, 2.2, 4), new THREE.MeshStandardMaterial({ color: 0xd4b483 }));
            roof.position.y = 3.6;
            roof.rotation.y = Math.PI / 4;
            roof.castShadow = true;
            group.add(walls, roof);
            group.position.set(x, getHeight(x, z), z);
            group.rotation.y = rot;
            scene.add(group);
        }

        function generateVillage() {
            const locs = [{x: 25, z: 25}, {x: 32, z: 35}, {x: 18, z: 40}, {x: 40, z: 20}, {x: 20, z: 15}];
            locs.forEach(l => createHouse(l.x, l.z, Math.random() * Math.PI));
        }

        function generateTerraces() {
            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 70 + Math.random() * 70;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const h = getHeight(x, z);
                if (h > 8 && h < 30) {
                    const w = 5 + Math.random() * 6;
                    const d = 4 + Math.random() * 5;
                    const hgt = 1.5;
                    const geo = new THREE.BoxGeometry(w, hgt, d);
                    const mat = new THREE.MeshStandardMaterial({ color: 0x6b8e23 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(x, h - 0.5, z);
                    mesh.rotation.y = Math.random() * Math.PI;
                    mesh.receiveShadow = true;
                    scene.add(mesh);
                    if (Math.random() > 0.4) {
                        const crop = new THREE.Mesh(new THREE.BoxGeometry(w*0.8, 0.25, d*0.8), new THREE.MeshStandardMaterial({ color: 0x9acd32 }));
                        crop.position.set(0, hgt/2 + 0.12, 0);
                        mesh.add(crop);
                    }
                }
            }
        }

        function generatePath() {
            const points = [];
            for (let z = 120; z > -120; z -= 4) {
                const x = Math.sin(z * 0.02) * 35;
                points.push(new THREE.Vector3(x, getHeight(x, z) + 0.15, z));
            }
            for (let i = 0; i < points.length - 1; i++) {
                const p1 = points[i], p2 = points[i+1];
                const dist = p1.distanceTo(p2);
                const geo = new THREE.BoxGeometry(3.5, 0.3, dist);
                const mat = new THREE.MeshStandardMaterial({ color: 0x8b7d6b });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.copy(p1).add(p2).multiplyScalar(0.5);
                mesh.lookAt(p2);
                mesh.rotateX(Math.PI / 2);
                mesh.receiveShadow = true;
                scene.add(mesh);
            }
        }

        function createObservatory(x, z) {
            const group = new THREE.Group();
            const base = new THREE.Mesh(new THREE.CylinderGeometry(7, 7, 0.6, 16), new THREE.MeshStandardMaterial({ color: 0x9c9c9c }));
            base.position.y = 0.3; base.receiveShadow = true;
            group.add(base);
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const stone = new THREE.Mesh(new THREE.BoxGeometry(0.6, 2.5, 0.6), new THREE.MeshStandardMaterial({ color: 0x7a7a7a }));
                stone.position.set(Math.cos(angle) * 6, 1.25, Math.sin(angle) * 6);
                stone.castShadow = true;
                group.add(stone);
            }
            const altar = new THREE.Mesh(new THREE.CylinderGeometry(1, 1.2, 1, 8), new THREE.MeshStandardMaterial({ color: 0x8b4513 }));
            altar.position.y = 0.5;
            group.add(altar);
            group.position.set(x, getHeight(x, z), z);
            scene.add(group);
        }

        function createLlama(x, z, color) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.7, 1.4), mat);
            body.position.y = 0.9;
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.9, 6), mat);
            neck.position.set(0, 1.6, 0.6); neck.rotation.x = -0.2;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.35, 0.6), mat);
            head.position.set(0, 2.0, 0.9);
            const legGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.9, 6);
            const l1 = new THREE.Mesh(legGeo, mat); l1.position.set(-0.3, 0.45, 0.5);
            const l2 = new THREE.Mesh(legGeo, mat); l2.position.set(0.3, 0.45, 0.5);
            const l3 = new THREE.Mesh(legGeo, mat); l3.position.set(-0.3, 0.45, -0.5);
            const l4 = new THREE.Mesh(legGeo, mat); l4.position.set(0.3, 0.45, -0.5);
            group.add(body, neck, head, l1, l2, l3, l4);
            const y = getHeight(x, z);
            group.position.set(x, y, z);
            group.castShadow = true;
            group.userData = { id: Math.random(), baseY: y };
            scene.add(group);
            llamas.push(group);
        }

        function generateAnimals() {
            for (let i = 0; i < 20; i++) {
                const x = (Math.random() - 0.5) * 120;
                const z = (Math.random() - 0.5) * 120;
                const y = getHeight(x, z);
                if (y > -1 && y < 20) {
                    createLlama(x, z, Math.random() > 0.4 ? 0xffffff : 0x8b4513);
                }
            }
        }

        function generateParcelas() {
            for (let i = 0; i < 15; i++) {
                const x = (Math.random() - 0.5) * 80;
                const z = (Math.random() - 0.5) * 80;
                const riverX = x + Math.sin(z * 0.03) * 15;
                if (Math.abs(riverX) < 22) continue;
                const w = 4 + Math.random() * 5, d = 4 + Math.random() * 5;
                const geo = new THREE.BoxGeometry(w, 0.25, d);
                const colors = [0x9acd32, 0x8fbc8f, 0xdaa520, 0x556b2f];
                const mat = new THREE.MeshStandardMaterial({ color: colors[Math.floor(Math.random() * colors.length)] });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, getHeight(x, z) + 0.15, z);
                mesh.rotation.y = Math.random() * Math.PI;
                mesh.receiveShadow = true;
                scene.add(mesh);
            }
        }

        function createPuquial(x, z) {
            const y = getHeight(x, z);
            const pool = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 2.5, 0.6, 16), new THREE.MeshStandardMaterial({ color: 0x0077be }));
            pool.position.set(x, y + 0.3, z);
            scene.add(pool);
            
            const count = 60;
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                positions[i*3] = x + (Math.random() - 0.5) * 2;
                positions[i*3+1] = y + 0.6 + Math.random();
                positions[i*3+2] = z + (Math.random() - 0.5) * 2;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const bubbles = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.8 }));
            scene.add(bubbles);
            bubblesList.push(bubbles);
            return { x, y: y + 0.6, z };
        }

        function generateCanalsAndPuquiales() {
            const p1 = createPuquial(60, 60);
            const p2 = createPuquial(-50, 80);
            
            const len1 = 50;
            const c1 = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, len1), new THREE.MeshStandardMaterial({ color: 0x0077be }));
            c1.position.set(p1.x, p1.y - 0.3, p1.z - len1/2);
            c1.rotation.x = 0.08;
            scene.add(c1);
            
            const len2 = 60;
            const c2 = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, len2), new THREE.MeshStandardMaterial({ color: 0x0077be }));
            c2.position.set(p2.x, p2.y - 0.3, p2.z - len2/2);
            c2.rotation.x = 0.08;
            c2.rotation.y = 0.3;
            scene.add(c2);
        }

        let waterfall, velArray;
        function createWaterfall() {
            const count = 2000;
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            velArray = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const z = 50 + (Math.random() - 0.5) * 5;
                const x = Math.sin(z * 0.03) * 15 + (Math.random() - 0.5) * 4;
                const y = 2 - Math.random() * 18;
                positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
                velArray[i*3+1] = -0.4 - Math.random() * 0.5;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            waterfall = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.35, transparent: true, opacity: 0.8 }));
            scene.add(waterfall);
        }

        // --- Inicialización del Mundo ---
        generateForest();
        generateGrass();
        generateRocks();
        generateVillage();
        generateTerraces();
        generatePath();
        createObservatory(0, -80);
        generateAnimals();
        generateParcelas();
        generateCanalsAndPuquiales();
        createWaterfall();

        // --- Controles de Maqueta (Orbit) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.1; // Evitar que la cámara pase bajo el suelo
        controls.minDistance = 30;
        controls.maxDistance = 250;
        controls.target.set(0, 0, 0);

        const blocker = document.getElementById('blocker');
        const uiHint = document.getElementById('ui-hint');
        
        let isInteracting = false;
        blocker.addEventListener('click', () => {
            blocker.style.opacity = '0';
            setTimeout(() => { blocker.style.display = 'none'; }, 300);
            uiHint.style.display = 'block';
            initAudio();
        });

        // --- Audio Procedural (Web Audio API) ---
        let audioCtx;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Viento
            const bufferSize = 2 * audioCtx.sampleRate;
            const windBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const windData = windBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) windData[i] = Math.random() * 2 - 1;
            const windNoise = audioCtx.createBufferSource();
            windNoise.buffer = windBuffer; windNoise.loop = true;
            const windFilter = audioCtx.createBiquadFilter();
            windFilter.type = 'lowpass'; windFilter.frequency.value = 400;
            const windGain = audioCtx.createGain();
            windGain.gain.value = 0.03;
            windNoise.connect(windFilter); windFilter.connect(windGain); windGain.connect(audioCtx.destination);
            windNoise.start();

            // Río
            const riverBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const riverData = riverBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) riverData[i] = Math.random() * 2 - 1;
            const riverNoise = audioCtx.createBufferSource();
            riverNoise.buffer = riverBuffer; riverNoise.loop = true;
            const riverFilter = audioCtx.createBiquadFilter();
            riverFilter.type = 'bandpass'; riverFilter.frequency.value = 300;
            const riverGain = audioCtx.createGain();
            riverGain.gain.value = 0.05;
            riverNoise.connect(riverFilter); riverFilter.connect(riverGain); riverGain.connect(audioCtx.destination);
            riverNoise.start();

            // Pájaros
            function chirp() {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;
                const freq = 2000 + Math.random() * 3000;
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.5, now + 0.15);
                gain.gain.setValueAtTime(0.02, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
                setTimeout(chirp, 3000 + Math.random() * 8000);
            }
            setTimeout(chirp, 2000);
        }

        // --- Loop de Animación ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Animación del agua
            const wPos = water.geometry.attributes.position;
            for (let i = 0; i < wPos.count; i++) {
                const lx = wPos.getX(i);
                const ly = wPos.getY(i);
                const wave = Math.sin(lx * 0.15 + time * 1.5) * 0.15 + Math.cos(ly * 0.15 + time) * 0.15;
                wPos.setZ(i, wave);
            }
            wPos.needsUpdate = true;

            // Animación de la cascada
            if (waterfall) {
                const pos = waterfall.geometry.attributes.position.array;
                for (let i = 0; i < pos.length / 3; i++) {
                    pos[i*3+1] += velArray[i*3+1];
                    if (pos[i*3+1] < -12) {
                        pos[i*3+1] = 2;
                        const z = 50 + (Math.random() - 0.5) * 5;
                        pos[i*3] = Math.sin(z * 0.03) * 15 + (Math.random() - 0.5) * 4;
                        pos[i*3+2] = z;
                    }
                }
                waterfall.geometry.attributes.position.needsUpdate = true;
            }

            // Animación de burbujas
            bubblesList.forEach(b => {
                const pos = b.geometry.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    let y = pos.getY(i) + 0.04;
                    if (y > 2.5) y = 0.6;
                    pos.setY(i, y);
                }
                pos.needsUpdate = true;
            });

            // Animación de llamas (respiración)
            llamas.forEach(llama => {
                llama.position.y = llama.userData.baseY + Math.abs(Math.sin(time * 1.5 + llama.userData.id)) * 0.1;
                llama.rotation.y += Math.sin(time * 0.5 + llama.userData.id) * 0.003;
            });

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            const d = 120;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
