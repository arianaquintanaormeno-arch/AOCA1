<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Tutor Real 🌌</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg-dark:#131314;
    --bg-sidebar:#1e1f20;
    --accent:#744bfa;
    --text:#e3e3e3;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
background: radial-gradient(circle,#0b0b1f,#000);
color:var(--text);
height:100vh;
overflow:hidden;
}

/* LOGIN */
.auth{
display:flex;
height:100vh;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:15px;
text-align:center;
width:300px;
backdrop-filter:blur(15px);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#111;
color:white;
}

button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
cursor:pointer;
}

/* APP */
.app{
display:none;
height:100vh;
}

.sidebar{
width:250px;
background:rgba(255,255,255,0.05);
padding:20px;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
overflow:auto;
}

.msg{
padding:12px;
border-radius:12px;
margin-bottom:10px;
max-width:70%;
}

.user{background:#2b2b3d;align-self:flex-end;}
.ai{background:#1e1f2a;align-self:flex-start;}

.footer{
display:flex;
padding:10px;
gap:10px;
}

.footer input{
flex:1;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="auth">
<div class="card">
<h2>IA Tutor 🌌</h2>
<input id="name" placeholder="Tu nombre">
<button onclick="start()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="app">

<div class="sidebar">
<h3>Materia</h3>
<select id="subject">
<option>Matemáticas</option>
<option>Ciencia</option>
<option>Historia</option>
<option>Inglés</option>
</select>
</div>

<div style="flex:1;display:flex;flex-direction:column;">
<div id="chat" class="chat"></div>

<div class="footer">
<input id="input" placeholder="Escribe tu pregunta...">
<button onclick="send()">➤</button>
</div>
</div>

</div>

<script>

let user="";

function start(){
user=document.getElementById("name").value;
if(!user) return alert("Escribe tu nombre");

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";
}

function add(sender,text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.textContent=sender+": "+text;
document.getElementById("chat").appendChild(div);
}

/* 🤖 IA REAL */
async function send(){

const input=document.getElementById("input");
const text=input.value;
if(!text) return;

add(user,text,"user");
input.value="";

add("IA","pensando... 🤖","ai");

const subject=document.getElementById("subject").value;

const response = await fetch("https://api.openai.com/v1/chat/completions", {
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer TU_API_KEY_AQUI"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{
role:"system",
content:`
Eres un tutor educativo.
Materia: ${subject}.
IMPORTANTE:
- NO des respuestas directas
- guía al estudiante con preguntas
- haz que piense paso a paso
- sé claro y educativo
`
},
{
role:"user",
content:text
}
]
})
});

const data = await response.json();

const reply = data.choices?.[0]?.message?.content || "Error IA";

add("IA",reply,"ai");
}

</script>

</body>
</html>
