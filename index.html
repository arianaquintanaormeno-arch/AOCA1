<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TutorIA Real</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background: radial-gradient(circle,#1a0b3d,#05060a);
color:white;
overflow:hidden;
}

.auth, .app{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:15px;
backdrop-filter:blur(15px);
width:320px;
text-align:center;
border:1px solid rgba(255,255,255,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:#7b5cff;
color:white;
cursor:pointer;
}

.app{
display:none;
flex-direction:row;
height:100vh;
}

.sidebar{
width:250px;
background:rgba(255,255,255,0.05);
padding:20px;
backdrop-filter:blur(10px);
}

.chat{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
overflow:auto;
gap:10px;
}

.msg{
padding:12px;
border-radius:12px;
max-width:70%;
}

.user{align-self:flex-end;background:#2a2a3a;}
.ai{align-self:flex-start;background:rgba(255,255,255,0.08);}

.footer{
display:flex;
padding:10px;
gap:10px;
}

.footer input{
flex:1;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="auth">
<div class="card">
<h2>TutorIA 🌌</h2>
<input id="name" placeholder="Tu nombre">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="app">

<div class="sidebar">
<h3>Materia</h3>
<select id="subject">
<option>Matemáticas</option>
<option>Ciencia</option>
<option>Historia</option>
<option>Inglés</option>
</select>
</div>

<div style="flex:1;display:flex;flex-direction:column;">

<div id="chat" class="chat"></div>

<div class="footer">
<input id="input" placeholder="Escribe...">
<button onclick="send()">➤</button>
</div>

</div>
</div>

<script>

let user="";

function login(){
user=document.getElementById("name").value;
if(!user) return alert("Escribe tu nombre");

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";
}

function add(sender,text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.textContent=sender+": "+text;
document.getElementById("chat").appendChild(div);
}

/* 🤖 IA REAL */
async function send(){

const input=document.getElementById("input");
const text=input.value;
if(!text) return;

add(user,text,"user");
input.value="";

add("TutorIA","pensando... 🤖","ai");

const subject=document.getElementById("subject").value;

const res = await fetch("https://api.openai.com/v1/chat/completions", {
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer TU_API_KEY_AQUI"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[
{
role:"system",
content:`Eres un tutor educativo. Materia: ${subject}. Ayuda al estudiante sin dar respuestas directas.`
},
{
role:"user",
content:text
}
]
})
});

const data = await res.json();

const reply = data.choices[0].message.content;

add("TutorIA",reply,"ai");
}

</script>

</body>
</html>
