<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TutorIA - Aprendizaje Guiado</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--bg:#131314;
--panel:#1e1f20;
--text:#e3e3e3;
--muted:#9aa0a6;
--accent:#744bfa;
--border:#333;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
}

/* LOGIN */
.auth{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:radial-gradient(circle,#3b1b6b,#131314);
}

.card{
background:rgba(30,31,32,0.9);
backdrop-filter:blur(12px);
padding:40px;
border-radius:18px;
width:380px;
text-align:center;
border:1px solid #2c2c2c;
}

.card h2{margin-bottom:10px;}

.card input{
width:100%;
padding:12px;
margin-top:15px;
border-radius:10px;
border:1px solid #333;
background:#131314;
color:white;
}

.card button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
cursor:pointer;
}

/* APP */
.app{
display:flex;
height:100vh;
}

.sidebar{
width:280px;
background:linear-gradient(180deg,#1e1f20,#151515);
padding:20px;
border-right:1px solid #2c2c2c;
}

.sidebar h3{color:var(--muted);margin-bottom:10px;}

.sidebar select,
.sidebar button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:#2b2a2a;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:var(--accent);
}

.content{
flex:1;
display:flex;
flex-direction:column;
}

.chat{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:75%;
padding:12px 14px;
border-radius:12px;
line-height:1.4;
animation:fade 0.3s ease;
}

.user{
align-self:flex-end;
background:#2b2a2a;
}

.ai{
align-self:flex-start;
background:#1e1f20;
border:1px solid #333;
}

.footer{
display:flex;
gap:10px;
padding:15px;
border-top:1px solid #2c2c2c;
background:#131314;
}

.footer input{
flex:1;
padding:12px;
border-radius:10px;
border:1px solid #333;
background:#1e1f20;
color:white;
}

.footer button{
width:50px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
cursor:pointer;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="auth">
<div class="card">
<h2>TutorIA</h2>
<p>Aprende paso a paso</p>
<input id="name" placeholder="Tu nombre">
<button onclick="login()">Entrar</button>
</div>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none;">

<div class="sidebar">
<h3>Materia</h3>

<select id="subject">
<option value="math">Matemáticas</option>
<option value="science">Ciencia</option>
<option value="history">Historia</option>
<option value="english">Inglés</option>
</select>

<button onclick="resetChat()">Reiniciar</button>
</div>

<div class="content">

<div id="chat" class="chat"></div>

<div class="footer">
<input id="input" placeholder="Escribe tu pregunta">
<button onclick="send()">➤</button>
</div>

</div>
</div>

<script>

/* DATA */
const DB={
math:{
topic:"Álgebra",
hint:"Usa operaciones inversas",
q:"¿Cómo despejas una x?",
exp:"Una ecuación mantiene equilibrio."
},
science:{
topic:"Materia",
hint:"Piensa en partículas",
q:"¿Qué pasa al calentar?",
exp:"La materia cambia con energía."
},
history:{
topic:"Historia",
hint:"Busca causas",
q:"¿Qué lo provocó?",
exp:"La historia estudia procesos."
},
english:{
topic:"English",
hint:"SVO order",
q:"What is the verb?",
exp:"Subject + Verb + Object"
}
};

let user="";
let step=1;
let subject="math";

/* LOGIN */
function login(){
user=document.getElementById("name").value.trim();
if(!user) return alert("Escribe tu nombre");

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="flex";
}

/* SEND */
function send(){
const input=document.getElementById("input");
const text=input.value.trim();
if(!text) return;

add(user,text,"user");
input.value="";

setTimeout(bot,500);
}

/* ADD MSG */
function add(sender,text,type){
const div=document.createElement("div");
div.className="msg "+type;
div.textContent=sender+": "+text;
document.getElementById("chat").appendChild(div);
}

/* BOT */
function bot(){
const d=DB[document.getElementById("subject").value];

if(step<=2){
add("TutorIA",`Tema: ${d.topic}. ${d.q}`,"ai");
step=3;
}
else if(step<=5){
add("TutorIA",`Pista: ${d.hint}`,"ai");
step=6;
}
else{
add("TutorIA",d.exp,"ai");
step=1;
}
}

/* RESET */
function resetChat(){
document.getElementById("chat").innerHTML="";
step=1;
}

</script>

</body>
</html>
